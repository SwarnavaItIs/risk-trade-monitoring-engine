name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend:
    name: Backend Tests and C++ Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    env:
      NODE_ENV: test
      JWT_SECRET: test_secret
      JWT_EXPIRES_IN: 7d
      ADMIN_REGISTRATION_SECRET: test_admin_secret
      FRONTEND_URL: http://localhost:5173
      VITE_API_BASE_URL: http://localhost:5000/api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Compile C++ risk engine
        run: npm run build:cpp:linux --if-present

      - name: Verify C++ risk engine
        run: npm run check:cpp --if-present

      - name: Run backend tests
        run: npm test --if-present

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    env:
      VITE_API_BASE_URL: http://localhost:5000/api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
